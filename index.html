<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Student 1: Navbar will go here -->

  <!-- Student 2: Hero Section will go here -->
  
  <!-- Student 3: Team Members will go here -->
  
  <!-- Student 4: Projects Section will go here -->

  <!-- Student 5: Contact Section -->
  <section id="contact">
    <h2>Contact Us</h2>
    
    <div class="contact-info">
      <p>We'd love to hear from you! Please reach out to us at:</p>
      <!-- Email link integrated here -->
      <a href="mailto:hello@teamportfolio.com" class="email-link">hello@teamportfolio.com</a>
    </div>

    <!-- Contact Form Element -->
    <form class="contact-form" action="#" method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required placeholder="Enter your full name">

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="Enter your email address">

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required placeholder="Type your message..."></textarea>

      <button type="submit">Send Message</button>
    </form>
  </section>

  <!-- Student 4: Footer will go here -->

  <script src="app.js"></script>
</body>
</html>
